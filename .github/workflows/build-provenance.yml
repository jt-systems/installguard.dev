name: Build provenance

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  attest-site-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Package build artifact
        run: tar -czf installguard-site-dist.tgz -C dist .

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: installguard-site-dist
          path: installguard-site-dist.tgz

      - name: Attest site artifact
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # v4
        with:
          subject-path: installguard-site-dist.tgz
