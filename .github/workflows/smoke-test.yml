name: Site CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  installguard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache InstallGuard signals
        uses: actions/cache@v4
        with:
          path: ~/.cache/installguard
          key: installguard-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            installguard-${{ runner.os }}-

      - name: Install InstallGuard
        run: |
          curl -fsSL https://github.com/jt-systems/installguard/releases/download/v0.3.4/installguard-x86_64-unknown-linux-musl \
            -o /usr/local/bin/installguard
          chmod +x /usr/local/bin/installguard
          installguard --version

      - name: Run InstallGuard
        run: installguard ci --path . --summary-file installguard-summary.json

      - name: Upload InstallGuard summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: installguard-summary
          path: installguard-summary.json
          if-no-files-found: ignore

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke test
        run: pnpm test:smoke
